name: Factory

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-factory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestrator
        run: python orchestrator.py
